services:
  postgres:
    image: postgres:16
    container_name: petrol-saas-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petrol_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: petrol-saas-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
